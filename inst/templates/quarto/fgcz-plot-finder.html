<!-- ════════════════════════════════════════════════════════════════════
     FGCZ Report Enhancements (plot finder + downloader + tab numbering)
     Injected into every report via _fgcz-report.yml:
         include-after-body: fgcz-plot-finder.html

     This file bundles the report-wide client-side niceties so there's a single
     after-body include to wire up:
       • Plot finder + downloader — the two right-edge buttons (below).
       • Tab numbering — hierarchical section numbers on every tab label
         (1, 1.1, 1.1.1 …); see the second <script> at the foot of the file.

     ── Plot finder + downloader ──
     Two floating buttons, bottom-right:
       🔍  FIND     — searchable list of every figure & table; clicking an
                      entry opens the tab(s) it lives in (Quarto hides
                      inactive-tab content) then scrolls + flashes it.
       📥  DOWNLOAD — tick-box list of every plot; bundle the checked ones
                      into a single ZIP. Plots are saved at the resolution
                      knitr embedded them at (the report's fig-dpi); the
                      browser only has that raster, so it can't re-render at a
                      higher DPI — the pane says as much.

     Self-contained: no external libraries, no network calls (CSP- and
     embed-resources-safe). The ZIP is built with a tiny hand-rolled
     store-only (no-compression) writer — fine because PNG/JPEG are already
     compressed. If JS is disabled the report is unchanged and the buttons
     never appear.
     ════════════════════════════════════════════════════════════════════ -->
<style>
  /* ── Right-edge toolbar: docked, labelled, conspicuous. ──────────────
     Vertically centred on the right edge. Buttons keep their ids
     (#fgcz-pf-btn / #fgcz-dl-btn) so the JS wiring is unchanged. Move the
     whole bar by editing `top`; resize buttons via width/padding. */
  .fgcz-pf-toolbar {
    position: fixed; right: 0; top: 50%; transform: translateY(-50%);
    z-index: 1080; display: flex; flex-direction: column;
  }
  .fgcz-pf-toolbar button {
    display: flex; flex-direction: column; align-items: center; gap: .15rem;
    width: 3.6rem; padding: .6rem .4rem;          /* button size */
    border: none; cursor: pointer; line-height: 1.1;
    background: var(--bs-primary, #0b5394); color: #fff;
    font-size: .7rem; font-weight: 600;            /* label text */
    box-shadow: -2px 2px 8px rgba(0, 0, 0, .25);
  }
  .fgcz-pf-toolbar button + button { border-top: 1px solid rgba(255, 255, 255, .25); }
  .fgcz-pf-toolbar button:first-child { border-top-left-radius: .6rem; }
  .fgcz-pf-toolbar button:last-child  { border-bottom-left-radius: .6rem; }
  .fgcz-pf-toolbar button:hover { filter: brightness(1.12); }
  .fgcz-pf-toolbar .ic { font-size: 1.25rem; }     /* icon size */

  /* ── Slide-out panels (off-screen until .open). Both share styling. ── */
  .fgcz-pf-panel {
    position: fixed; top: 0; right: 0; z-index: 1081;
    width: 360px; max-width: 90vw; height: 100vh; background: #fff;
    box-shadow: -2px 0 12px rgba(0, 0, 0, .25);
    transform: translateX(100%);          /* parked off-screen to the right */
    transition: transform .2s ease;
    display: flex; flex-direction: column;
  }
  .fgcz-pf-panel.open { transform: translateX(0); }   /* slid into view */

  .fgcz-pf-head {
    padding: .75rem 1rem; border-bottom: 1px solid #dee2e6;
    display: flex; align-items: center; gap: .5rem;
  }
  .fgcz-pf-head h2 { font-size: 1rem; margin: 0; flex: 1; }
  .fgcz-pf-close {
    background: none; border: none; font-size: 1.4rem; line-height: 1;
    cursor: pointer; color: #666;
  }
  #fgcz-pf-search {
    margin: .75rem 1rem; padding: .4rem .6rem; border: 1px solid #ced4da;
    border-radius: .375rem; font-size: .9rem;
  }
  .fgcz-pf-list {
    list-style: none; margin: 0; padding: 0 .5rem 1rem;
    overflow-y: auto; flex: 1;             /* scrolls if the list is long */
  }
  .fgcz-pf-item { padding: .5rem .6rem; border-radius: .375rem; cursor: pointer; }
  .fgcz-pf-item:hover { background: var(--bs-gray-100, #f8f9fa); }
  .fgcz-pf-item .lbl { display: block; font-weight: 500; }
  .fgcz-pf-item .crumb { display: block; font-size: .78rem; color: #6c757d; }

  /* Little Fig/Tbl badge before each finder label. */
  .fgcz-pf-badge {
    display: inline-block; font-size: .65rem; font-weight: 700;
    text-transform: uppercase; padding: .05rem .35rem; border-radius: .25rem;
    margin-right: .35rem; vertical-align: middle;
  }
  .fgcz-pf-badge.fig { background: #cfe2ff; color: #084298; }   /* blue  */
  .fgcz-pf-badge.tbl { background: #d1e7dd; color: #0f5132; }   /* green */
  .fgcz-pf-empty { padding: 1rem; color: #6c757d; font-size: .9rem; }

  /* Flash outline applied to a target for ~2s after you jump to it. */
  .fgcz-pf-flash {
    outline: 3px solid var(--bs-primary, #0b5394);
    outline-offset: 4px; border-radius: 2px;
  }

  /* ── Download-pane bits. ────────────────────────────────────────────── */
  .fgcz-pf-selall { margin: .6rem 1rem .25rem; font-size: .85rem; }
  .fgcz-pf-selall label { cursor: pointer; }
  .fgcz-dl-row { display: flex; gap: .5rem; align-items: flex-start; cursor: pointer; }
  .fgcz-dl-row input { margin-top: .2rem; flex: none; }
  .fgcz-pf-foot { padding: .75rem 1rem; border-top: 1px solid #dee2e6; }
  .fgcz-pf-dlbtn {
    width: 100%; padding: .5rem; border: none; border-radius: .375rem;
    background: var(--bs-primary, #0b5394); color: #fff; font-weight: 600;
    cursor: pointer;
  }
  .fgcz-pf-dlbtn:hover { filter: brightness(1.1); }
  .fgcz-pf-dlbtn:disabled { opacity: .5; cursor: default; }
  .fgcz-pf-note { font-size: .75rem; color: #6c757d; margin-top: .5rem; }
</style>

<!-- Right-edge toolbar -->
<div class="fgcz-pf-toolbar">
  <button id="fgcz-pf-btn" title="Find a plot or table" aria-label="Find a plot"><span class="ic">🔍</span>Find</button>
  <button id="fgcz-dl-btn" title="Download plots" aria-label="Download plots"><span class="ic">📥</span>Save</button>
</div>

<!-- FIND panel -->
<div id="fgcz-pf-panel" class="fgcz-pf-panel" aria-hidden="true">
  <div class="fgcz-pf-head">
    <h2>Find a plot</h2>
    <button class="fgcz-pf-close" data-close="fgcz-pf-panel" aria-label="Close">×</button>
  </div>
  <input id="fgcz-pf-search" type="search" placeholder="Filter figures &amp; tables…" />
  <ul id="fgcz-pf-list" class="fgcz-pf-list"></ul>
</div>

<!-- DOWNLOAD panel -->
<div id="fgcz-dl-panel" class="fgcz-pf-panel" aria-hidden="true">
  <div class="fgcz-pf-head">
    <h2>Download plots</h2>
    <button class="fgcz-pf-close" data-close="fgcz-dl-panel" aria-label="Close">×</button>
  </div>
  <div class="fgcz-pf-selall">
    <label><input type="checkbox" id="fgcz-dl-all" checked> Select all</label>
  </div>
  <ul id="fgcz-dl-list" class="fgcz-pf-list"></ul>
  <div class="fgcz-pf-foot">
    <button id="fgcz-dl-go" class="fgcz-pf-dlbtn">Download ZIP</button>
    <div class="fgcz-pf-note">
      Plots download at the resolution embedded in the report (its fig-dpi).
    </div>
  </div>
</div>

<script>
(function () {
  "use strict";

  // ─── tab / breadcrumb helpers ──────────────────────────────────────

  // Selector matching the nav-link (tab button) that controls a pane #id.
  // Memoised: panes share ancestors, so without the cache crumbFor() would
  // re-run the same document.querySelector once per item per tab-depth. The
  // link element's identity is stable (only its classes toggle), so the cache
  // stays valid for the page's lifetime.
  var _linkCache = {};
  function linkForPane(id) {
    if (id in _linkCache) return _linkCache[id];
    return (_linkCache[id] = document.querySelector(
      '[aria-controls="' + id + '"], [data-bs-target="#' + id + '"], ' +
      'a.nav-link[href="#' + id + '"]'
    ));
  }

  // Breadcrumb (outer → inner) of tab labels enclosing an element.
  function crumbFor(el) {
    var parts = [], pane = el.closest('.tab-pane');
    while (pane) {
      var link = pane.id ? linkForPane(pane.id) : null;
      if (link) parts.unshift(link.textContent.trim());
      pane = pane.parentElement ? pane.parentElement.closest('.tab-pane') : null;
    }
    return parts;
  }

  // Activate one tab (toggle classes within its own tabset only).
  function activate(pane) {
    var link = pane.id ? linkForPane(pane.id) : null;
    if (link) {
      var nav = link.closest('.nav-tabs') || link.closest('.nav');
      if (nav) nav.querySelectorAll('.nav-link').forEach(function (a) {
        a.classList.remove('active'); a.setAttribute('aria-selected', 'false');
      });
      link.classList.add('active'); link.setAttribute('aria-selected', 'true');
    }
    var content = pane.closest('.tab-content');
    if (content) content.querySelectorAll(':scope > .tab-pane').forEach(function (p) {
      p.classList.remove('active', 'show');
    });
    pane.classList.add('active', 'show');
  }

  // Open every ancestor tab of `el` (outer → inner), then scroll + flash.
  function reveal(el) {
    var chain = [], pane = el.closest('.tab-pane');
    while (pane) {
      chain.unshift(pane);
      pane = pane.parentElement ? pane.parentElement.closest('.tab-pane') : null;
    }
    chain.forEach(activate);
    closeAll();
    setTimeout(function () {            // let the tab switches lay out first
      el.scrollIntoView({ behavior: 'smooth', block: 'center' });
      el.classList.add('fgcz-pf-flash');
      setTimeout(function () { el.classList.remove('fgcz-pf-flash'); }, 2000);
    }, 60);
  }

  // ─── index of figures + tables ─────────────────────────────────────

  function buildIndex() {
    var items = [], seenImgs = new Set();

    // 1) Figures (Quarto crossref floats + any plain <figure>).
    document.querySelectorAll('figure').forEach(function (fig) {
      var cap = fig.querySelector('figcaption');
      var img = fig.querySelector('img');
      if (img) seenImgs.add(img);
      items.push({ type: 'fig', label: cap ? cap.textContent.trim() : null, el: fig });
    });

    // 2) Bare plot images (knitr output that has no fig-cap → no <figure>).
    document.querySelectorAll('.cell-output-display img').forEach(function (img) {
      if (seenImgs.has(img)) return;
      items.push({ type: 'fig', label: null, el: img });
    });

    // 3) Interactive tables. DT / ezInteractiveTableRmd render as htmlwidgets
    //    that initialise via JS AFTER page load, so target the htmlwidget
    //    CONTAINER (always in the DOM); its <caption> is filled by the time
    //    the panel is opened (we rebuild the index on every open).
    document.querySelectorAll('div.html-widget.datatables, .dt-container').forEach(function (wrap) {
      var cap = wrap.querySelector('caption');
      items.push({ type: 'tbl', label: cap ? cap.textContent.trim() : null, el: wrap });
    });

    // Resolve labels (caption → innermost tab name → generic), attach a
    // breadcrumb, and de-duplicate identical labels with " (n)".
    var counts = {};
    items.forEach(function (it) {
      it.crumb = crumbFor(it.el);
      if (!it.label) {
        it.label = it.crumb.length ? it.crumb[it.crumb.length - 1]
                                   : (it.type === 'tbl' ? 'Table' : 'Figure');
      }
      counts[it.label] = (counts[it.label] || 0) + 1;
      if (counts[it.label] > 1) it.label += ' (' + counts[it.label] + ')';
    });
    return items;
  }

  function escapeHtml(s) {
    return s.replace(/[&<>"]/g, function (c) {
      return { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;' }[c];
    });
  }

  // ─── FIND panel ────────────────────────────────────────────────────

  var listEl, searchEl, findPanel, FIND_INDEX = null;

  function renderFind(filter) {
    filter = (filter || '').toLowerCase();
    listEl.innerHTML = '';
    var shown = 0;
    FIND_INDEX.forEach(function (it) {
      var hay = (it.label + ' ' + it.crumb.join(' ')).toLowerCase();
      if (filter && hay.indexOf(filter) === -1) return;
      shown++;
      var li = document.createElement('li');
      li.className = 'fgcz-pf-item';
      var badge = it.type === 'tbl' ? 'tbl' : 'fig';
      li.innerHTML =
        '<span class="lbl"><span class="fgcz-pf-badge ' + badge + '">' +
        (badge === 'tbl' ? 'Tbl' : 'Fig') + '</span>' + escapeHtml(it.label) + '</span>' +
        (it.crumb.length
          ? '<span class="crumb">' + escapeHtml(it.crumb.join(' › ')) + '</span>'
          : '');
      li.addEventListener('click', function () { reveal(it.el); });
      listEl.appendChild(li);
    });
    if (!shown) {
      var empty = document.createElement('li');
      empty.className = 'fgcz-pf-empty';
      empty.textContent = filter ? 'No matches.' : 'No figures or tables found.';
      listEl.appendChild(empty);
    }
  }

  function openFind() {
    closeAll();
    FIND_INDEX = buildIndex();        // rebuild so late-init DT tables appear
    renderFind(searchEl.value);
    findPanel.classList.add('open');
    findPanel.setAttribute('aria-hidden', 'false');
    searchEl.focus();
  }

  // ─── DOWNLOAD panel ────────────────────────────────────────────────

  var dlListEl, dlPanel, dlAllEl, dlGoEl, DL_INDEX = null;

  // Plots only (figures), in document order.
  function plotItems() {
    return buildIndex().filter(function (it) { return it.type === 'fig'; });
  }

  function renderDownloads() {
    DL_INDEX = plotItems();
    dlListEl.innerHTML = '';
    if (!DL_INDEX.length) {
      dlListEl.innerHTML = '<li class="fgcz-pf-empty">No plots to download.</li>';
      dlGoEl.disabled = true; dlAllEl.checked = false;
      return;
    }
    dlGoEl.disabled = false; dlAllEl.checked = true;
    DL_INDEX.forEach(function (it, i) {
      var li = document.createElement('li');
      li.className = 'fgcz-pf-item';
      li.innerHTML =
        '<label class="fgcz-dl-row">' +
        '<input type="checkbox" class="fgcz-dl-cb" data-i="' + i + '" checked>' +
        '<span><span class="lbl">' + escapeHtml(it.label) + '</span>' +
        (it.crumb.length
          ? '<span class="crumb">' + escapeHtml(it.crumb.join(' › ')) + '</span>'
          : '') +
        '</span></label>';
      dlListEl.appendChild(li);
    });
  }

  function openDownload() {
    closeAll();
    renderDownloads();
    dlPanel.classList.add('open');
    dlPanel.setAttribute('aria-hidden', 'false');
  }

  // ── tiny ZIP writer (STORE method, no compression) ──────────────────
  function u16(v) { return new Uint8Array([v & 0xff, (v >>> 8) & 0xff]); }
  function u32(v) {
    return new Uint8Array([v & 0xff, (v >>> 8) & 0xff, (v >>> 16) & 0xff, (v >>> 24) & 0xff]);
  }
  function concat(arrs) {
    var len = 0; arrs.forEach(function (a) { len += a.length; });
    var out = new Uint8Array(len), p = 0;
    arrs.forEach(function (a) { out.set(a, p); p += a.length; });
    return out;
  }
  var _crcTable;
  function crc32(bytes) {
    if (!_crcTable) {
      _crcTable = new Uint32Array(256);
      for (var n = 0; n < 256; n++) {
        var c = n;
        for (var k = 0; k < 8; k++) c = (c & 1) ? (0xEDB88320 ^ (c >>> 1)) : (c >>> 1);
        _crcTable[n] = c >>> 0;
      }
    }
    var crc = -1;
    for (var i = 0; i < bytes.length; i++) crc = (crc >>> 8) ^ _crcTable[(crc ^ bytes[i]) & 0xff];
    return (crc ^ -1) >>> 0;
  }
  function makeZip(files) {           // files: [{name, bytes:Uint8Array}]
    var enc = new TextEncoder(), local = [], central = [], offset = 0;
    files.forEach(function (f) {
      var nameBytes = enc.encode(f.name);
      var crc = crc32(f.bytes), size = f.bytes.length;
      var header = concat([
        u32(0x04034b50), u16(20), u16(0), u16(0),    // sig, ver, flags, method(store)
        u16(0), u16(0),                              // mod time, mod date
        u32(crc), u32(size), u32(size),              // crc, comp size, uncomp size
        u16(nameBytes.length), u16(0)                // name len, extra len
      ]);
      local.push(header, nameBytes, f.bytes);
      central.push(concat([
        u32(0x02014b50), u16(20), u16(20), u16(0), u16(0), // sig, ver made, ver needed, flags, method
        u16(0), u16(0),                                    // mod time, mod date
        u32(crc), u32(size), u32(size),                    // crc, comp size, uncomp size
        u16(nameBytes.length), u16(0), u16(0),             // name, extra, comment len
        u16(0), u16(0), u32(0),                            // disk #, internal/external attrs
        u32(offset)                                        // local header offset
      ]), nameBytes);
      offset += header.length + nameBytes.length + size;
    });
    var cSize = 0; central.forEach(function (c) { cSize += c.length; });
    var end = concat([
      u32(0x06054b50), u16(0), u16(0),
      u16(files.length), u16(files.length),
      u32(cSize), u32(offset), u16(0)
    ]);
    return new Blob(local.concat(central).concat([end]), { type: 'application/zip' });
  }

  // ── extracting a plot's bytes ───────────────────────────────────────
  function b64ToBytes(b64) {
    var bin = atob(b64), out = new Uint8Array(bin.length);
    for (var i = 0; i < bin.length; i++) out[i] = bin.charCodeAt(i);
    return out;
  }
  function extFor(mime) {
    return ({ 'image/png': 'png', 'image/jpeg': 'jpg', 'image/jpg': 'jpg',
      'image/webp': 'webp', 'image/gif': 'gif', 'image/svg+xml': 'svg' })[mime] || 'png';
  }
  function dataUriToFile(uri, baseName) {
    var comma = uri.indexOf(',');
    if (uri.slice(0, 5) !== 'data:' || comma < 0) return null;
    var header = uri.slice(5, comma), data = uri.slice(comma + 1);
    var isB64 = /;base64$/i.test(header);
    var mime = header.replace(/;base64$/i, '') || 'application/octet-stream';
    var bytes = isB64 ? b64ToBytes(data.replace(/\s+/g, ''))
                      : new TextEncoder().encode(decodeURIComponent(data));
    return { name: baseName + '.' + extFor(mime), bytes: bytes };
  }
  // Turn an indexed figure into a {name, bytes} file, or null if unreadable.
  function plotToFile(item, baseName) {
    var el = item.el;
    var img = el.tagName === 'IMG' ? el : el.querySelector('img');
    if (img && img.src && img.src.indexOf('data:') === 0) {
      return dataUriToFile(img.src, baseName);   // embedded raster (PNG/JPEG)
    }
    var svg = el.tagName && el.tagName.toLowerCase() === 'svg' ? el : el.querySelector('svg');
    if (svg) {                                   // inline vector figure
      return { name: baseName + '.svg',
        bytes: new TextEncoder().encode(new XMLSerializer().serializeToString(svg)) };
    }
    return null;                                 // non-embedded src — can't read offline
  }
  function sanitise(s) {
    return s.replace(/[^A-Za-z0-9._ -]/g, '').trim().replace(/\s+/g, '_').slice(0, 80) || 'plot';
  }
  function downloadBlob(blob, filename) {
    var url = URL.createObjectURL(blob), a = document.createElement('a');
    a.href = url; a.download = filename;
    document.body.appendChild(a); a.click();
    setTimeout(function () { URL.revokeObjectURL(url); a.remove(); }, 1000);
  }

  function doDownload() {
    var files = [], used = {}, skipped = 0;
    dlListEl.querySelectorAll('.fgcz-dl-cb').forEach(function (cb) {
      if (!cb.checked) return;
      var it = DL_INDEX[+cb.dataset.i];
      var base = sanitise(it.label), name = base, n = 1;
      while (used[name]) name = base + '_' + (++n);  // unique base name
      var f = plotToFile(it, name);
      if (f) { used[name] = true; files.push(f); } else { skipped++; }
    });
    if (!files.length) {
      alert('No downloadable plots selected.\n(Images must be embedded in the report.)');
      return;
    }
    downloadBlob(makeZip(files), 'plots.zip');
    if (skipped) {
      // A couple of plots had non-embedded sources; tell the user honestly.
      setTimeout(function () {
        alert(skipped + ' plot(s) could not be read (source not embedded) and were skipped.');
      }, 300);
    }
  }

  // ─── shared open/close + wiring ────────────────────────────────────

  function closeAll() {
    [findPanel, dlPanel].forEach(function (p) {
      p.classList.remove('open'); p.setAttribute('aria-hidden', 'true');
    });
  }

  document.addEventListener('DOMContentLoaded', function () {
    findPanel = document.getElementById('fgcz-pf-panel');
    dlPanel   = document.getElementById('fgcz-dl-panel');
    listEl    = document.getElementById('fgcz-pf-list');
    searchEl  = document.getElementById('fgcz-pf-search');
    dlListEl  = document.getElementById('fgcz-dl-list');
    dlAllEl   = document.getElementById('fgcz-dl-all');
    dlGoEl    = document.getElementById('fgcz-dl-go');

    document.getElementById('fgcz-pf-btn').addEventListener('click', openFind);
    document.getElementById('fgcz-dl-btn').addEventListener('click', openDownload);
    document.querySelectorAll('.fgcz-pf-close').forEach(function (b) {
      b.addEventListener('click', closeAll);
    });
    searchEl.addEventListener('input', function () { renderFind(searchEl.value); });
    document.addEventListener('keydown', function (e) {
      if (e.key === 'Escape') closeAll();
    });

    // Select-all toggles every checkbox in the download list.
    dlAllEl.addEventListener('change', function () {
      dlListEl.querySelectorAll('.fgcz-dl-cb').forEach(function (cb) {
        cb.checked = dlAllEl.checked;
      });
    });
    dlGoEl.addEventListener('click', doDownload);

    // Show buttons only when there's something to act on.
    var probe = buildIndex();
    if (!probe.length) document.getElementById('fgcz-pf-btn').style.display = 'none';
    if (!probe.some(function (it) { return it.type === 'fig'; })) {
      document.getElementById('fgcz-dl-btn').style.display = 'none';
    }
  });
})();
</script>

<!-- ════════════════════════════════════════════════════════════════════
     Tab numbering
     Prepends a hierarchical section number to every tab label:
         top level → 1, 2, 3 …
         nested    → 1.1, 1.2, 2.1 …
         deeper    → 1.1.1, 1.1.2 …
     Numbering continues across sibling tabsets at the same depth, so two
     separate top-level tabsets read 1,2 then 3,4 (not 1,2 then 1,2).

     WHY JS AND NOT CSS COUNTERS: Quarto emits ALL of a tabset's nav buttons
     first, then all of its tab-content. By the time a CSS counter reached the
     first nested tab row it would already have counted every outer button — so
     pure counters give "3.1" where we want "1.1". We instead walk the real
     tab→pane hierarchy in document order.

     Idempotent: re-running updates the existing number span rather than stacking
     a second one. The finder above reads tab labels via textContent, so its
     breadcrumbs pick up the numbers for free.
     ════════════════════════════════════════════════════════════════════ -->
<script>
(function () {
  "use strict";

  // First direct child of `parent` carrying class `cls` (Quarto puts the
  // nav-tabs <ul> and tab-content <div> as direct children of .panel-tabset).
  function directChild(parent, cls) {
    for (var i = 0; i < parent.children.length; i++) {
      if (parent.children[i].classList.contains(cls)) return parent.children[i];
    }
    return null;
  }

  // The tab buttons of ONE tabset (this tabset's own row, not descendants').
  function tabLinks(ts) {
    var nav = directChild(ts, 'nav-tabs') || directChild(ts, 'nav');
    if (!nav) return [];
    return Array.prototype.slice.call(
      nav.querySelectorAll(':scope > .nav-item > .nav-link, :scope > .nav-link'));
  }

  // The tab panes of ONE tabset, in the same order as its links.
  function tabPanes(ts) {
    var content = directChild(ts, 'tab-content');
    if (!content) return [];
    return Array.prototype.slice.call(content.querySelectorAll(':scope > .tab-pane'));
  }

  // The shallowest .panel-tabset(s) inside `container`: those with no other
  // .panel-tabset between them and `container`. From document.body this yields
  // the top-level tabsets; from a tab-pane it yields that pane's direct
  // sub-tabsets (skipping any deeper than one level).
  function shallowTabsets(container) {
    return Array.prototype.filter.call(
      container.querySelectorAll('.panel-tabset'),
      function (ts) {
        var p = ts.parentElement;
        while (p && p !== container) {
          if (p.classList.contains('panel-tabset')) return false;
          p = p.parentElement;
        }
        return true;
      });
  }

  // Prepend (or update) the number span on a tab button. The trailing space
  // keeps the finder's textContent breadcrumb readable ("1.1 Sepal").
  function applyNumber(link, num) {
    var badge = link.querySelector(':scope > .fgcz-tabnum');
    if (!badge) {
      badge = document.createElement('span');
      badge.className = 'fgcz-tabnum';
      link.insertBefore(badge, link.firstChild);
    }
    badge.textContent = num + ' ';
  }

  // Number a GROUP of sibling tabsets sharing `prefix` (''=top level), with a
  // single counter running across the whole group, then recurse into each tab's
  // pane for the next level down.
  function numberGroup(tabsets, prefix) {
    var next = 1;
    tabsets.forEach(function (ts) {
      var links = tabLinks(ts), panes = tabPanes(ts);
      links.forEach(function (link, i) {
        var num = (prefix ? prefix + '.' : '') + next;
        applyNumber(link, num);
        if (panes[i]) numberGroup(shallowTabsets(panes[i]), num);
        next++;
      });
    });
  }

  document.addEventListener('DOMContentLoaded', function () {
    numberGroup(shallowTabsets(document.body), '');
  });
})();
</script>
