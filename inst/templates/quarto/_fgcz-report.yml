## ─────────────────────────────────────────────────────────────
## FGCZ Shared Report Defaults
## Include in individual .qmd files via:
##   metadata-files: ["_fgcz-report.yml"]
## ─────────────────────────────────────────────────────────────

format:
  html:
    embed-resources: true
    self-contained: true
    smooth-scroll: true
    page-layout: full

    # Code — no inline or folded code in the body; just a "View Source" action
    # (the whole .qmd in a modal overlay), fired from the right-edge toolbar box
    # in fgcz-plot-finder.html. Source is embedded, so it works offline
    # (embed-resources). toggle:false drops Show/Hide-all-code.
    code-tools:
      source: true
      toggle: false

    # Theme — flatly base + FGCZ overrides (tabset card styling for now)
    theme: [spacelab, fgcz.scss]

    # Grid sizing
    grid:
      body-width: 1800px
      sidebar-width: 250px
      margin-width: 100px

    # FGCZ header
    include-in-header: fgcz_header_quarto.html

    # Floating "Find a plot" finder (searchable index of all figures/tables;
    # opens the enclosing tab on click). Self-contained; see the file for knobs.
    include-after-body: fgcz-plot-finder.html

    # Figure defaults
    fig-dpi: 300
    fig-align: left

# Execution
execute:
  echo: false
  warning: false
  message: false

# Knitr defaults — plots should fit on screen; click lightbox for full size
knitr:
  opts_chunk:
    fig.width: 6
    fig.height: 5
    fig.retina: 2
    out.width: "40%"

# Cross-references
crossref:
  fig-title: "Figure"
  tbl-title: "Table"
  title-delim: ":"

# Lightbox for all figures
lightbox: true
